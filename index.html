<!DOCTYPE html>
<html>
<head>
  <title>Spot 5 Differences</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0; 
      background: #111; 
      text-align: center; 
      color: white; 
      font-family: sans-serif; 
      padding: 20px 10px;
    }
    .game-container {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin-bottom: 15px;
    }
    .media-box {
      width: 48%;
      max-width: 400px;
      height: 300px;
      border: 2px solid #333;
    }
    .media-box img, .media-box video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .credit {
      font-size: 14px;
      color: #888;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <h2>Level 1: Find 5 differences</h2>
  <p>Look closely at the eyes... Can you spot all 5?</p>
  
  <div class="game-container">
    <div class="media-box" id="box1">
      <img src="normal.jpg">
    </div>
    <div class="media-box" id="box2">
      <img src="normal.jpg">
    </div>
  </div>
  
  <p class="credit">Created by Hadi 💀</p>

  <script>
    // 10 SECOND KAZHINJU GHOST VARUM + SOUND UND
    setTimeout(() => {
      document.getElementById('box1').innerHTML = '<video src="jumpscare.mp4" autoplay style="width:100%; height:100%; object-fit:cover;"></video>';
      document.getElementById('box2').innerHTML = '<video src="jumpscare.mp4" autoplay style="width:100%; height:100%; object-fit:cover;"></video>';
    }, 10000); // 10000 = 10 second
  </script>
</body>
</html>
