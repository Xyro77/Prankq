<!DOCTYPE html>
<html>
<head>
  <title>Spot 5 Differences</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    .game-container {
      display: flex;
      gap: 8px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 15px;
    }
    .game-img {
      width: 48%;
      max-width: 450px;
      border: 2px solid #333;
      object-fit: cover;
      height: 300px;
    }
    .credit {
      font-size: 14px;
      color: #888;
      margin-top: 20px;
    }
  </style>
</head>
<body style="margin:0; background:#111; text-align:center; color:white; font-family:sans-serif; padding:20px 10px;">
  <h2>Level 1: Find 5 differences</h2>
  <p>Look closely at the eyes... Can you spot all 5?</p>
  
  <div class="game-container">
    <video class="game-img" id="img1" src="351-500x400.jpg" muted></video>
    <video class="game-img" id="img2" src="351-500x400.jpg" muted></video>
  </div>
  
  <p class="credit">Created by Hadi 💀</p>

  <script>
    window.addEventListener('load', function() {
      let video1 = document.getElementById('img1');
      let video2 = document.getElementById('img2');
      
      // 5 sec kazhinju nee thanna ghost video varum
      setTimeout(() => {
        video1.src = "jumpscare.mp4";
        video2.src = "jumpscare.mp4";
        video1.loop = true;
        video2.loop = true;
        video1.play();
        video2.play();
      }, 5000);
    });
  </script>
</body>
</html>
