<!DOCTYPE html>
<html>
<head>
  <title>Spot 5 Differences</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    .game-container {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 15px;
    }
    .game-img {
      width: 45%;
      max-width: 300px;
      cursor: pointer;
      border: 2px solid #333;
    }
    .credit {
      font-size: 14px;
      color: #888;
      margin-top: 20px;
    }
  </style>
</head>
<body style="margin:0; background:#111; text-align:center; color:white; font-family:sans-serif; padding:20px;">
  <h2>Level 1: Find 5 differences</h2>
  <p>Tap either image to start. Look closely at the eyes...</p>
  
  <div class="game-container">
    <img class="game-img" id="img1" src="351-500x400.jpg">
    <img class="game-img" id="img2" src="351-500x400.jpg">
  </div>
  
  <p class="credit">Created by Hadi 💀</p>
  
  <audio id="scream" src="https://www.myinstants.com/media/sounds/female-scream.mp3"></audio>
  
  <div id="jumpscare" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:black; z-index:999;">
    <img src="ghost.jpg" style="width:100%; height:100%; object-fit:cover;">
  </div>

  <script>
    function startScare() {
      document.getElementById('scream').play().then(() => {
        document.getElementById('scream').pause();
        document.getElementById('scream').currentTime = 0;
      });
      setTimeout(() => {
        document.getElementById('jumpscare').style.display = 'block';
        document.getElementById('scream').play();
      }, 5000);
    }
    
    document.getElementById('img1').addEventListener('click', startScare);
    document.getElementById('img2').addEventListener('click', startScare);
  </script>
</body>
</html>
