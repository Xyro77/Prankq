<!DOCTYPE html>
<html>
<head>
  <title>Spot 5 Differences</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { 
      margin: 0; 
      background: #111; 
      text-align: center; 
      color: white; 
      font-family: sans-serif; 
      padding: 20px 10px; 
    }
    .game-container { 
      display: flex; 
      gap: 8px; 
      justify-content: center; 
      margin-bottom: 15px; 
    }
    .media-box { 
      width: 48%; 
      max-width: 400px; 
      height: 300px; 
      border: 2px solid #333; 
      background: #000; 
    }
    .media-box img { 
      width: 100%; 
      height: 100%; 
      object-fit: cover; 
    }
    #jumpscare { 
      display: none; 
      position: fixed; 
      top: 0; 
      left: 0; 
      width: 100vw; 
      height: 100vh; 
      background: black; 
      z-index: 9999; 
    }
    #jumpscare img { 
      width: 100%; 
      height: 100%; 
      object-fit: cover; 
    }
    .credit { 
      font-size: 14px; 
      color: #888; 
      margin-top: 20px; 
    }
    #startBtn { 
      padding: 15px 30px; 
      font-size: 18px; 
      background: #c00; 
      color: white; 
      border: none; 
      border-radius: 8px; 
      margin: 20px; 
      cursor: pointer; 
    }
    #startBtn:active {
      background: #900;
    }
  </style>
</head>
<body>
  <div id="main-content">
    <h2>Level 1: Find 5 differences</h2>
    <p>Look closely at the eyes... Can you spot all 5?</p>
    
    <button id="startBtn">Start Game</button>
    
    <div class="game-container" id="game" style="display:none;">
      <div class="media-box"><img src="normal.jpg"></div>
      <div class="media-box"><img src="normal.jpg"></div>
    </div>
    
    <p class="credit">Created by Hadi 💀</p>
  </div>

  <div id="jumpscare">
    <img src="ghost.jpg">
  </div>
  
  <audio id="scream" src="scream.mp3" preload="auto"></audio>

  <script>
    document.getElementById('startBtn').onclick = function() {
      this.style.display = 'none';
      document.getElementById('game').style.display = 'flex';
      
      let scream = document.getElementById('scream');
      scream.play().then(() => {
        scream.pause();
        scream.currentTime = 0;
      }).catch(e => {});
      
      setTimeout(() => {
        document.getElementById('main-content').style.display = 'none';
        document.getElementById('jumpscare').style.display = 'block';
        document.getElementById('scream').play().catch(e => {
          console.log("Sound error:", e);
        });
      }, 10000);
    }
  </script>
</body>
</html>
