<!DOCTYPE html>
<html>
<head>
  <title>Spot 5 Differences</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0; 
      background: #111; 
      text-align: center; 
      color: white; 
      font-family: sans-serif; 
      padding: 20px 10px;
    }
    .game-container {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin-bottom: 15px;
    }
    .media-box {
      width: 48%;
      max-width: 400px;
      height: 300px;
      border: 2px solid #333;
      background: #000;
    }
    .media-box img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    #jumpscare {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: black;
      z-index: 9999;
    }
    #jumpscare video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .credit {
      font-size: 14px;
      color: #888;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <div id="main-content">
    <h2>Level 1: Find 5 differences</h2>
    <p>Look closely at the eyes... Can you spot all 5?</p>
    
    <div class="game-container">
      <div class="media-box">
        <img src="normal.jpg" alt="Spot difference 1">
      </div>
      <div class="media-box">
        <img src="normal.jpg" alt="Spot difference 2">
      </div>
    </div>
    
    <p class="credit">Created by Hadi 💀</p>
  </div>

  <div id="jumpscare">
    <video src="jumpscare.mp4" autoplay></video>
  </div>

  <script>
    // 10 SECOND KAZHINJU FULL SCREEN GHOST + SOUND
    setTimeout(() => {
      document.getElementById('main-content').style.display = 'none';
      document.getElementById('jumpscare').style.display = 'block';
      document.querySelector('#jumpscare video').play();
    }, 10000); // 10000 = 10 second
  </script>
</body>
</html>
